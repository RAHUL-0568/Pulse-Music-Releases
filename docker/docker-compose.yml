services:
    # Production frontend -- always runs
    pulse music:
        build:
            context: ..
            dockerfile: docker/Dockerfile
            args:
                - AUTH_ENABLED=${AUTH_ENABLED}
                - AUTH_SECRET=${AUTH_SECRET}
                - APPWRITE_ENDPOINT=${APPWRITE_ENDPOINT}
                - APPWRITE_PROJECT_ID=${APPWRITE_PROJECT_ID}
                - POCKETBASE_URL=${POCKETBASE_URL}
                - SESSION_MAX_AGE=${SESSION_MAX_AGE}
        container_name: pulse music
        ports:
            - '${PULSE_MUSIC_PORT:-3000}:4173'
        restart: unless-stopped
        networks:
            - pulse music-network
        healthcheck:
            test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:4173/']
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 5s

    # PocketBase backend -- only starts with: docker compose --profile pocketbase up -d
    pocketbase:
        image: ghcr.io/muchobien/pocketbase:latest
        container_name: pulse music-pocketbase
        profiles:
            - pocketbase
        restart: unless-stopped
        environment:
            PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-admin@example.com}
            PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-changeme}
            TZ: ${TZ:-UTC}
        ports:
            - '${POCKETBASE_PORT:-8090}:8090'
        volumes:
            - pb_data:/pb_data
            - pb_public:/pb_public
            - pb_hooks:/pb_hooks
        command: serve --http=0.0.0.0:8090
        healthcheck:
            test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8090/api/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 30s
        networks:
            - pulse music-network

    # Development server -- only starts with: docker compose --profile dev up -d
    pulse music-dev:
        build:
            context: ..
            dockerfile: docker/Dockerfile.dev
        container_name: pulse music-dev
        profiles:
            - dev
        ports:
            - '${PULSE_MUSIC_DEV_PORT:-5173}:5173'
        volumes:
            - ..:/app
            - /app/node_modules
        command: npm run dev -- --host 0.0.0.0
        networks:
            - pulse music-network

networks:
    pulse music-network:
        driver: bridge

volumes:
    pb_data:
    pb_public:
    pb_hooks:
